    nombre: "Acceso y Uso de Tecnología"
    color: "#1B4F72"
    preguntas:

      - num: 1
        pregunta: "¿Tiene el NNA acceso a internet desde su hogar o dispositivos propios?"
        indicador: "Acceso y disponibilidad de internet"
        dirigida_a: "Niña, Niño o Adolescente"
        opciones:
          - texto: "No tiene acceso a internet"
            valor: 0
          - texto: "Tiene acceso con supervisión de un adulto"
            valor: 1
          - texto: "Tiene acceso sin ningún tipo de supervisión"
            valor: 3
        respuesta_seleccionada: "Tiene acceso sin ningún tipo de supervisión"
        valor: 3
        justificacion: >
          La NNA tiene smartphone propio con plan de datos sin restricciones.
          Su cuidadora desconoce el contenido al que accede.

      - num: 2
        pregunta: "¿Cuántas horas diarias pasa el NNA conectada/o a internet o usando dispositivos?"
        indicador: "Tiempo de exposición a internet"
        dirigida_a: "Niña, Niño o Adolescente"
