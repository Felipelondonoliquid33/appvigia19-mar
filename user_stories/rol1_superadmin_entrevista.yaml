# =============================================================================
# PASO COMENTARIO: OBSERVACIONES (PasoComentarioScreen)
# =============================================================================
paso_comentario:
  observaciones: >
    La NNA usa TikTok, Instagram, Discord y WhatsApp diariamente con un promedio de 5-6
    horas de uso. Tiene una cuenta de TikTok con más de 800 seguidores, la mayoría
    desconocidos. Ha sostenido conversaciones privadas con al menos dos usuarios adultos
    que no conoce personalmente. Uno de ellos le solicitó fotos y le ofreció recargas.
    Su cuidadora trabaja jornada completa y no revisa el dispositivo ni conoce las
    plataformas que utiliza. El riesgo de explotación sexual digital es SIGNIFICATIVO
    y requiere intervención inmediata en red de apoyo y activación de ruta de atención.

