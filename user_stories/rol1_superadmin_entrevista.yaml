          - texto: "Menos de 1 hora diaria"
            valor: 0
          - texto: "Entre 1 y 3 horas diarias"
            valor: 1
          - texto: "Más de 3 horas diarias"
            valor: 3
        respuesta_seleccionada: "Más de 3 horas diarias"
        valor: 3
        justificacion: "Reporta uso de más de 5 horas diarias, principalmente en la noche."

      - num: 3
        pregunta: "¿Qué tipo de dispositivos digitales utiliza el NNA con mayor frecuencia?"
        indicador: "Tipo de dispositivo y nivel de exposición"
        dirigida_a: "Niña, Niño o Adolescente"
        opciones:
          - texto: "Solo computador del colegio o casa sin internet"
            valor: 0
          - texto: "Tablet o computador con internet supervisado"
            valor: 1
          - texto: "Smartphone propio con plan de datos y sin filtros"
            valor: 3
        respuesta_seleccionada: "Smartphone propio con plan de datos y sin filtros"
        valor: 3
        justificacion: "Tiene smartphone Galaxy propio desde los 11 años."

  categoria_2:
    nombre: "Redes Sociales y Plataformas Digitales"
    color: "#154360"
    preguntas:

      - num: 4
        pregunta: "¿Tiene el NNA perfiles activos en redes sociales o plataformas de videojuegos?"
