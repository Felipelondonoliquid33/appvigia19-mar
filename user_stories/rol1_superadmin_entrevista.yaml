    1. ACTIVACIÓN INMEDIATA DE RUTA DE PROTECCIÓN: Notificar a ICBF (Línea 141)
       y al Defensor de Familia la situación de riesgo identificada.
    2. ACOMPAÑAMIENTO PSICOSOCIAL: Iniciar proceso de orientación especializada
       para la NNA y su cuidadora.
    3. INTERVENCIÓN FAMILIAR: Capacitar a la cuidadora en supervisión digital,
       establecimiento de normas de uso y configuración de controles parentales.
    4. SEGUIMIENTO EN COLEGIO: Articular con orientadora escolar para acompañamiento
       en el entorno educativo.
    5. EDUCACIÓN DIGITAL: Trabajar con la NNA habilidades de autoprotección digital,
       reconocimiento de situaciones de grooming y rutas de denuncia.

