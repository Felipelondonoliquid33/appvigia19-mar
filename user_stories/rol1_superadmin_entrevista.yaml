        valor: 3
        justificacion: "TikTok e Instagram con cuentas públicas. Ha recibido mensajes privados de adultos desconocidos."

      - num: 6
        pregunta: "¿El NNA ha aceptado solicitudes de contacto de personas desconocidas en redes?"
        indicador: "Contacto con personas desconocidas"
        dirigida_a: "Niña, Niño o Adolescente"
        opciones:
