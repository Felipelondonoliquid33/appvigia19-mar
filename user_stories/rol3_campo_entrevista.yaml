paso_comentario:
  observaciones: >
    NNA en zona rural con acceso limitado y supervisado a internet. No presenta factores
    de riesgo activos de ESDI pero sí factores de vulnerabilidad estructural: víctima de
    desplazamiento, sin asistencia escolar regular, sin educación en seguridad digital.
    La ausencia de conocimiento sobre riesgos digitales y rutas de apoyo representa
    un riesgo preventivo que debe atenderse. Se recomienda intervención de fortalecimiento
    de habilidades protectoras. Redes sociales identificadas: WhatsApp familiar.
    No usa TikTok, Instagram ni videojuegos online.

