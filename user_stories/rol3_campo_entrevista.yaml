            valor: 3
        respuesta_seleccionada: "Menos de 1 hora diaria"
        valor: 0
        justificacion: "Acceso limitado. El celular es compartido y la conexión en zona rural es inestable."

      - num: 3
        pregunta: "¿Qué tipo de dispositivos digitales utiliza el NNA con mayor frecuencia?"
        indicador: "Tipo de dispositivo y nivel de exposición"
        dirigida_a: "Niño"
        opciones:
          - texto: "Solo dispositivos del colegio o casa sin internet propio"
            valor: 0
          - texto: "Tablet o computador con internet supervisado"
            valor: 1
          - texto: "Smartphone propio con plan de datos y sin filtros"
            valor: 3
        respuesta_seleccionada: "Solo dispositivos del colegio o casa sin internet propio"
        valor: 0
        justificacion: "No tiene dispositivo propio. Solo accede al celular de la madre con permiso."

  categoria_2:
    nombre: "Redes Sociales y Plataformas"
    color: "#154360"
