  nivel_riesgo: "BAJO"
  id_riesgo: 2
  color_riesgo: "#F4D03F"

  recomendaciones: |
    1. EDUCACIÓN EN SEGURIDAD DIGITAL: Trabajar con el NNA y su familia en conceptos
       básicos de seguridad digital y reconocimiento de riesgos en internet.
    2. CONTINUIDAD ESCOLAR: Gestionar la matrícula activa y la asistencia regular al colegio
       como factor protector fundamental.
    3. FORTALECIMIENTO DE HABILIDADES PROTECTORAS: Trabajar con el NNA la identificación
       de situaciones de riesgo y las rutas de apoyo disponibles.
    4. SEGUIMIENTO PERIÓDICO: Visita de seguimiento en 2 meses para valorar cambios
       en el acceso y uso de tecnología.
