paso_dos_indicadores:

  categoria_1:
    nombre: "Acceso y Uso de Tecnología"
    color: "#1B4F72"
    preguntas:

      - num: 1
        pregunta: "¿Tiene el NNA acceso a internet desde su hogar o dispositivos propios?"
        indicador: "Acceso y disponibilidad de internet"
        dirigida_a: "Niño"
        opciones:
          - texto: "No tiene acceso a internet"
            valor: 0
          - texto: "Tiene acceso con supervisión de un adulto"
            valor: 1
          - texto: "Tiene acceso sin ningún tipo de supervisión"
            valor: 3
        respuesta_seleccionada: "Tiene acceso con supervisión de un adulto"
        valor: 1
        justificacion: "Tiene acceso al celular de su madre, pero solo con permiso. Usa WhatsApp para mensajear."

      - num: 2
        pregunta: "¿Cuántas horas diarias pasa el NNA conectado a internet?"
        indicador: "Tiempo de exposición a internet"
        dirigida_a: "Niño"
