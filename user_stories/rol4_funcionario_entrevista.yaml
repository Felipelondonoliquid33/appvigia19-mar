      puntaje: 3
    - indicadores_demograficos: 7

  nivel_riesgo: "BAJO"
  id_riesgo: 2
  color_riesgo: "#F4D03F"

  recomendaciones: |
    1. CAPACITACIÓN ESPECÍFICA EN ESDI: Programar formación intensiva para el docente
       y su equipo directivo sobre identificación, denuncia y atención de casos de ESDI.
    2. ACTUALIZACIÓN DE PROTOCOLOS: Revisar y actualizar el manual de convivencia
       incorporando un capítulo específico sobre ESDI con rutas de acción claras.
    3. ARTICULACIÓN INSTITUCIONAL: Establecer contacto formal con ICBF, Comisaría de Familia
       y Policía Cibernética para crear una ruta de atención institucional documentada.
    4. PROGRAMA PREVENTIVO: Diseñar e implementar un programa de prevención de ESDI
       para estudiantes y familias de la IE con actividades periódicas y medibles.
    5. REVISIÓN DE INFRAESTRUCTURA DIGITAL: Instalar filtros de contenido en la sala
       de informática y establecer políticas de uso seguro de la tecnología en la institución.
