paso_comentario:
  observaciones: >
    Docente de bachillerato con 18 años de experiencia en la institución. Tiene disposición
    para aprender y mejorar pero la institución no ha priorizado la formación en ESDI.
    La institución no tiene protocolo específico para explotación digital y la coordinación
    con entidades de protección es informal. Se identifica una brecha importante entre la
    capacidad de detección individual del funcionario y la respuesta institucional organizada.
    El docente reconoce haber identificado al menos 2 estudiantes en situación de posible riesgo
    en el último año, pero gestionó los casos sin activar correctamente la ruta de atención.
    Herramientas digitales de la institución: sala de informática compartida sin filtros de contenido.

