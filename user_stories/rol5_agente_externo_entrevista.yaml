      puntaje: 5
    - categoria: "Capacidades Comunitarias de Prevención"
      puntaje: 4
    - categoria: "Articulación con Entidades"
      puntaje: 2
    - categoria: "Seguimiento y Acompañamiento"
      puntaje: 5
    - indicadores_demograficos: 9

  nivel_riesgo: "BAJO"
  id_riesgo: 2
  color_riesgo: "#F4D03F"

  recomendaciones: |
    1. ARTICULACIÓN URGENTE CON ICBF: Reportar inmediatamente los 3 casos de NNA
       identificados con posible riesgo. El agente debe acompañar el proceso de denuncia.
    2. FORMACIÓN TÉCNICA EN ESDI: Incluir a la líder comunitaria en talleres de capacitación
       del programa ModoSeguro sobre ESDI, señales de alerta y rutas de atención.
    3. DOTACIÓN DE MATERIALES: Proporcionar materiales físicos y digitales actualizados
       en formato para distribución comunitaria en zonas con baja conectividad.
    4. FORMALIZACIÓN DE LA RED COMUNITARIA: Apoyar la estructuración de la red de
       líderes comunitarios con procesos documentados y vínculos institucionales.
    5. PLAN DE TRABAJO COMUNITARIO: Construir junto con la líder un plan de acción
       comunitaria con indicadores de cobertura y seguimiento para 6 meses.
    6. CAPACITACIÓN EN RUTAS: Taller específico sobre Línea 141, PARD de ICBF,
       Policía Cibernética y Comisaría de Familia del municipio.
